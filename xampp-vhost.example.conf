# === ConnectHub — VirtualHost Apache/XAMPP para reverse proxy ===
# 1) Habilite no httpd.conf:
#      LoadModule proxy_module modules/mod_proxy.so
#      LoadModule proxy_http_module modules/mod_proxy_http.so
#      LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so
#      LoadModule rewrite_module modules/mod_rewrite.so
#      LoadModule headers_module modules/mod_headers.so
# 2) Inclua este arquivo (ou copie o bloco) em httpd-vhosts.conf
# 3) Reinicie o Apache

<VirtualHost *:80>
  ServerName seusaas.local
  ServerAdmin admin@seusaas.local

  # WebSocket upgrade (Realtime Supabase + HMR do Vite em dev)
  RewriteEngine On
  RewriteCond %{HTTP:Upgrade} =websocket [NC]
  RewriteRule /(.*)  ws://localhost:3000/$1 [P,L]
  RewriteCond %{HTTP:Upgrade} !=websocket [NC]
  RewriteRule /(.*)  http://localhost:3000/$1 [P,L]

  ProxyPreserveHost On
  ProxyPass        / http://localhost:3000/
  ProxyPassReverse / http://localhost:3000/

  # Headers de segurança
  Header always set X-Content-Type-Options "nosniff"
  Header always set X-Frame-Options "SAMEORIGIN"
  Header always set Referrer-Policy "strict-origin-when-cross-origin"
  Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

  ErrorLog  "logs/connecthub-error.log"
  CustomLog "logs/connecthub-access.log" combined
</VirtualHost>

# ==== HTTPS (recomendado em produção) ====
